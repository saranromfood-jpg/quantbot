exchange:
  id: bitkub
  api_key: YOUR_API_KEY
  api_secret: YOUR_API_SECRET
  testnet: false
trading:
  mode: paper
  quote: THB
  symbols:
  - BTC/THB
  - ETH/THB
  - XRP/THB
  - ADA/THB
  timeframe: 1d
  poll_seconds: 3600
  min_notional: 15
  initial_capital: 100000
risk:
  risk_per_trade: 0.01
  max_position_pct: 0.2
  max_open_positions: 3
  atr_stop_multiplier: 4.0
  atr_target_multiplier: 3.0
  trailing_stop: true
  let_winners_run: true
  max_daily_loss_pct: 0.03
  max_drawdown_pct: 0.1
strategies:
  trend_momentum:
    enabled: true
    weight: 0.45
    ema_fast: 21
    ema_slow: 55
    rsi_period: 14
    adx_threshold: 20
  mean_reversion:
    enabled: false
    weight: 0.3
    bb_period: 20
    bb_std: 2.0
    zscore_entry: 2.0
    adx_max: 25
  ml_factor:
    enabled: false
    weight: 0.25
    lookback_bars: 1500
    retrain_every_bars: 96
    min_confidence: 0.58
ensemble:
  long_threshold: 0.35
  short_threshold: -0.35
  allow_short: false
dashboard:
  host: 127.0.0.1
  port: 8050
market:
  type: spot
regime:
  adx_trend: 28
  adx_range: 18
  weights_trending:
    trend: 0.55
    meanrev: 0.05
    ml: 0.4
  weights_ranging:
    trend: 0.15
    meanrev: 0.55
    ml: 0.3
  weights_transition:
    trend: 0.4
    meanrev: 0.3
    ml: 0.3
  confidence_scaling: true
  macro_filter: true
  macro_ema: 200
execution_v2:
  base_slippage_bps: 5.0
  slippage_vol_coef: 0.15
  slippage_cap_bps: 50.0
  fee_rate: 0.0025
  funding_rate_per_8h: 0.0001
  time_gate_utc:
  - 2
  - 5
breakers_v2:
  consecutive_losses: 5
  consecutive_pause_hours: 4
  vol_spike_multiple: 3.0
ml_v2:
  train_window: 4000
  retrain_every_bars: 96
  conf_threshold: 0.62
  calibrate: true
backtest:
  universe:
  - BTC/THB
  - ETH/THB
  - USDT/THB
  - ADA/THB
  - XRP/THB
  train_months: 6
  test_months: 1
  oos_holdout_pct: 0.25
portfolio:
  enabled: true
  universe:
  - BTC/THB
  - ETH/THB
  - XRP/THB
  - ADA/THB
  - LTC/THB
  - BCH/THB
  - DOGE/THB
  - LINK/THB
  - XLM/THB
  - DOT/THB
  - NEAR/THB
  alloc_pct: 0.05
  max_positions: 10
  ema_period: 200
  trail_atr: 6.0
  market_filter: true
  market_symbol: BTC/THB
  warmup_bars: 320
commodity:
  enabled: true
