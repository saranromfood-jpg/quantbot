services:
  - type: web
    name: quantbot
    runtime: python
    region: singapore        # หลีกเลี่ยง US (Binance บล็อก IP สหรัฐ)
    plan: starter            # free plan จะ sleep เมื่อไม่มีคนเปิด dashboard -> บอทหยุด
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: API_KEY
        sync: false
      - key: API_SECRET
        sync: false
      - key: TESTNET
        value: "true"
      - key: TRADING_MODE
        value: "paper"
      - key: BITKUB_PROXY
        sync: false        # ตั้งเป็น Thai HTTPS proxy เมื่อจะเปิด live (ปล่อยว่างได้ตอน paper)
